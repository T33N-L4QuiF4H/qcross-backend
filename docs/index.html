<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Q~Cross</title>
<style>
  :root{
    --bg:#0b0b14; --ink:#e9e9f3; --dim:#8a8aa3; --accent:#9ef01a;
    --tile:#2a2a44; --tile-bd:#4a4a7a; --cell:#15152a; --cell-bd:#20203a;
    --placed:#3a4a2a;
    --nes-bg:#1a1a2e; --snes-bg:#2b1d4a;
    --ok:#2a6a2a; --err:#7a2a2a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:ui-monospace,Menlo,Consolas,monospace;
    -webkit-text-size-adjust:100%;overscroll-behavior:none;touch-action:manipulation}
  body{min-height:100dvh;display:flex;flex-direction:column}
  header{padding:10px 14px;border-bottom:1px solid #20203a;
    display:flex;align-items:center;justify-content:space-between}
  header h1{margin:0;font-size:16px;letter-spacing:2px}
  header .meta{font-size:11px;color:var(--dim)}
  main{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px;gap:10px}
  button{font:inherit;background:#1d1d33;color:var(--ink);
    border:1px solid #33335a;border-radius:6px;padding:8px 12px;min-height:40px;cursor:pointer}
  button.primary{background:var(--accent);color:#0b0b14;border-color:var(--accent);font-weight:bold}
  button.danger{background:#5a2a2a;border-color:#7a3a3a}
  .menu{display:grid;gap:10px;max-width:340px;width:100%;margin-top:20px}
  .menu h2{margin:6px 0;font-size:13px;color:var(--dim);letter-spacing:1px}
  .status{font-size:12px;color:var(--dim);min-height:1em;text-align:center}
  .row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;width:100%;max-width:560px}
  .rack{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;
    padding:8px;background:#10101e;border:1px solid #20203a;border-radius:8px;
    width:100%;max-width:560px;min-height:54px}
  .tile{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
    background:var(--tile);border:2px solid var(--tile-bd);border-radius:6px;
    font-size:20px;font-weight:bold;color:var(--ink);cursor:grab;touch-action:none}
  .tile.sel{outline:3px solid var(--accent);outline-offset:1px}
  .tile.dim{opacity:0.25;cursor:default}
  .tile.dragging{opacity:0.5}
  .board-wrap{width:100%;max-width:560px;overflow:auto}
  .board{display:grid;gap:1px;background:#000;padding:1px;border-radius:4px;
    grid-template-columns:repeat(13,1fr);width:100%;aspect-ratio:1/1;min-width:340px}
  .cell{background:var(--cell);display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:bold;position:relative;cursor:pointer;
    border:1px solid transparent;touch-action:none}
  .cell.has{background:var(--placed);border-color:#6a8a4a;cursor:grab}
  .cell.drop-target{outline:2px solid var(--accent);outline-offset:-2px;z-index:2;background:#2a3a4a}
  body.skin-nes{--bg:var(--nes-bg);--accent:#f5d300;--placed:#0f3460}
  body.skin-snes{--bg:var(--snes-bg);--accent:#ffd166;--placed:#3a2a6b}
  .info{width:100%;max-width:560px;font-size:12px;color:var(--dim);
    background:#10101e;border:1px solid #20203a;border-radius:6px;padding:8px;text-align:center}
  .result{width:100%;max-width:560px;font-size:14px;font-weight:bold;
    border-radius:6px;padding:10px;text-align:center;min-height:0;display:none}
  .result.show{display:block}
  .result.ok{background:var(--ok);color:#fff;border:1px solid #4a9a4a}
  .result.err{background:var(--err);color:#fff;border:1px solid #aa4a4a}
  .result.info{background:#2a3a5a;color:#fff;border:1px solid #4a5a8a}
  #ghost{position:fixed;pointer-events:none;z-index:9999;width:40px;height:40px;
    display:flex;align-items:center;justify-content:center;background:var(--tile);
    border:2px solid var(--accent);border-radius:6px;font-size:20px;font-weight:bold;
    color:var(--ink);transform:translate(-50%,-50%);display:none}
  footer{padding:8px;font-size:10px;color:var(--dim);text-align:center}
</style>
</head>
<body class="skin-nes">
<header>
  <h1>Q~CROSS</h1>
  <span class="meta" id="meta">menu</span>
</header>
<main id="app"><div class="status">booting…</div></main>
<div id="ghost"></div>
<footer>backend: qcross-backend.onrender.com</footer>
<script>
const BACKEND = "https://qcross-backend.onrender.com";
const $ = (id) => document.getElementById(id);
const GRID = 13;

const DICE = [
  ["A","E","I","O","U","Y"], ["A","C","H","O","P","S"], ["A","D","E","I","N","R"],
  ["A","D","E","I","N","R"], ["B","C","D","E","F","G"], ["E","H","I","N","O","T"],
  ["E","I","K","L","O","T"], ["E","I","N","Q","S","U"], ["E","L","M","N","O","S"],
  ["G","I","L","N","O","U"], ["I","N","O","R","S","T"], ["M","P","R","S","T","U"],
];

const state = {
  mode:"menu", source:null, letters:[], rack:[], grid:null,
  selectedTile:-1, puzzleNumber:null, clues:[], drag:null,
};

function setSkin(s){
  document.body.classList.remove("skin-nes","skin-snes");
  document.body.classList.add("skin-"+s);
  localStorage.setItem("qx_skin", s);
}
(function initSkin(){ setSkin(localStorage.getItem("qx_skin") || "nes"); })();

function emptyGrid(){ const g=[]; for(let r=0;r<GRID;r++) g.push(new Array(GRID).fill(null)); return g; }

function renderMenu(){
  state.mode="menu"; $("meta").textContent="menu";
  $("app").innerHTML = `
    <div class="menu">
      <h2>SKIN</h2>
      <div class="row">
        <button id="skinNes" style="flex:1">NES</button>
        <button id="skinSnes" style="flex:1">SNES</button>
      </div>
      <h2>PLAY</h2>
      <button class="primary" id="playDaily">Daily Puzzle</button>
      <button id="playDice">Dice Mode (roll your own)</button>
      <div class="status" id="status"></div>
    </div>`;
  $("skinNes").onclick=()=>setSkin("nes");
  $("skinSnes").onclick=()=>setSkin("snes");
  $("playDaily").onclick=startDaily;
  $("playDice").onclick=startDice;
}

async function startDaily(){
  const s=$("status"); s.textContent="fetching daily…";
  try{
    const r=await fetch(`${BACKEND}/daily`,{cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const p=await r.json();
    state.source="daily";
    state.letters=p.letters.map(x=>x.toUpperCase());
    state.puzzleNumber=p.puzzle_number;
    state.clues=p.clues||[];
    initPlay();
  } catch(e){ s.textContent="error: "+e.message; }
}

function startDice(){
  state.source="dice";
  state.letters=DICE.map(d=>d[Math.floor(Math.random()*6)]);
  state.puzzleNumber=null; state.clues=[];
  initPlay();
}

function initPlay(){
  state.rack=state.letters.map(l=>({letter:l,used:false}));
  state.grid=emptyGrid(); state.selectedTile=-1; state.mode="play";
  $("meta").textContent=state.source==="daily"?`Daily #${state.puzzleNumber}`:"Dice Mode";
  renderPlay();
}

const $ = (id) => document.getElementById(id);
const GRID = 13;

const DICE = [
  ["A","E","I","O","U","Y"], ["A","C","H","O","P","S"], ["A","D","E","I","N","R"],
  ["A","D","E","I","N","R"], ["B","C","D","E","F","G"], ["E","H","I","N","O","T"],

  ["G","I","L","N","O","U"], ["I","N","O","R","S","T"], ["M","P","R","S","T","U"],

  mode:"menu", source:null, letters:[], rack:[], grid:null,

function renderMenu(){
  state.mode="menu"; $("meta").textContent="menu";
  $("app").innerHTML = `
    <div class="menu">
      <h2>SKIN</h2>
      <div class="row">
        <button id="skinNes" style="flex:1">NES</button>
        <button id="skinSnes" style="flex:1">SNES</button>
      </div>
      <h2>PLAY</h2>
      <button class="primary" id="playDaily">Daily Puzzle</button>
      <button id="playDice">Dice Mode (roll your own)</button>
      <div class="status" id="status"></div>
    </div>`;
  $("skinNes").onclick=()=>setSkin("nes");
  $("skinSnes").onclick=()=>setSkin("snes");
  $("playDaily").onclick=startDaily;
  $("playDice").onclick=startDice;

async function startDaily(){
  const s=$("status"); s.textContent="fetching daily…";
  try{
    const r=await fetch(`${BACKEND}/daily`,{cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const p=await r.json();
    state.source="daily";
    state.letters=p.letters.map(x=>x.toUpperCase());
    state.puzzleNumber=p.puzzle_number;
    state.clues=p.clues||[];
    initPlay();
  } catch(e){ s.textContent="error: "+e.message; }
}

function startDice(){
  state.source="dice";
  state.letters=DICE.map(d=>d[Math.floor(Math.random()*6)]);
  state.puzzleNumber=null; state.clues=[];
  initPlay();
}

function initPlay(){
  state.rack=state.letters.map(l=>({letter:l,used:false}));
  state.grid=emptyGrid(); state.selectedTile=-1; state.mode="play";
  $("meta").textContent=state.source==="daily"?`Daily #${state.puzzleNumber}`:"Dice Mode";
  renderPlay();
}
function renderPlay(){
  $("app").innerHTML = `
    <div class="row">
      <button id="menuBtn">≡ Menu</button>
      <button id="rollBtn" ${state.source==="daily"?"disabled":""}>🎲 Reroll</button>
      <button id="clearBtn">Clear Board</button>
      <button id="hintBtn">💡 Hint</button>
      <button class="primary" id="checkBtn">Check (<span id="placedCount">0</span>/12)</button>
    </div>
    <div class="rack" id="rack"></div>
    <div class="info" id="info">Drag a tile to the board, or tap a tile then tap a cell. Drag placed tiles to move them.</div>
    <div class="result" id="result"></div>
    <div class="board-wrap"><div class="board" id="board"></div></div>
  `;
  $("menuBtn").onclick=()=>{ if(confirm("Return to menu? Your board will be lost.")) renderMenu(); };
  $("rollBtn").onclick=()=>{ if(confirm("Reroll dice? Your board will be lost.")) startDice(); };
  $("clearBtn").onclick=clearBoard;
  $("hintBtn").onclick=askHint;
  $("checkBtn").onclick=checkSolution;
  renderRack();
  renderBoard();
  updateCount();
}

function updateCount(){
  const el=$("placedCount");
  if(el) el.textContent=countPlaced();
}

function countPlaced(){
  let n=0;
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++) if(state.grid[r][c]) n++;
  return n;
}

function renderRack(){
  const el=$("rack"); el.innerHTML="";
  state.rack.forEach((t,i)=>{
    const d=document.createElement("div");
    d.className="tile"+(t.used?" dim":"")+(state.selectedTile===i?" sel":"");
    d.textContent=t.letter;
    d.dataset.src="rack"; d.dataset.idx=i;
    if(!t.used){
      d.onclick=()=>{ state.selectedTile=(state.selectedTile===i)?-1:i; renderRack(); };
      attachDrag(d,{src:"rack",idx:i});
    }
    el.appendChild(d);
  });
}

function renderBoard(){
  const el=$("board"); el.innerHTML="";
  for(let r=0;r<GRID;r++){
    for(let c=0;c<GRID;c++){
      const cell=state.grid[r][c];
      const d=document.createElement("div");
      d.className="cell"+(cell?" has":"");
      d.textContent=cell?cell.letter:"";
      d.dataset.r=r; d.dataset.c=c;
      d.onclick=()=>onCellTap(r,c);
      if(cell) attachDrag(d,{src:"cell",r,c});
      el.appendChild(d);
    }
  }
}

function onCellTap(r,c){
  const cell=state.grid[r][c];
  if(cell){
    state.rack[cell.tileIdx].used=false;
    state.grid[r][c]=null;
    state.selectedTile=-1;
    renderRack(); renderBoard(); updateCount();
    return;
  }
  const i=state.selectedTile;
  if(i<0) return;
  if(state.rack[i].used) return;
  state.grid[r][c]={letter:state.rack[i].letter,tileIdx:i};
  state.rack[i].used=true;
  state.selectedTile=-1;
  renderRack(); renderBoard(); updateCount();
}

function clearBoard(){
  if(!confirm("Clear the board?")) return;
  state.grid=emptyGrid();
  state.rack.forEach(t=>t.used=false);
  state.selectedTile=-1;
  hideResult();
  renderRack(); renderBoard(); updateCount();
}

// ---------- DRAG AND DROP (touch + mouse unified) ----------
function attachDrag(el, payload){
  const start=(ev)=>{
    ev.preventDefault();
    const pt=getPoint(ev);
    state.drag={payload, x:pt.x, y:pt.y, letter:el.textContent};
    showGhost(pt.x, pt.y, el.textContent);
    el.classList.add("dragging");
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", end);
    document.addEventListener("touchmove", move, {passive:false});
    document.addEventListener("touchend", end);
  };
  el.addEventListener("mousedown", start);
  el.addEventListener("touchstart", start, {passive:false});
}

function getPoint(ev){
  if(ev.touches && ev.touches[0]) return {x:ev.touches[0].clientX, y:ev.touches[0].clientY};
  if(ev.changedTouches && ev.changedTouches[0]) return {x:ev.changedTouches[0].clientX, y:ev.changedTouches[0].clientY};
  return {x:ev.clientX, y:ev.clientY};
}

function showGhost(x,y,letter){
  const g=$("ghost");
  g.textContent=letter;
  g.style.display="flex";
  g.style.left=x+"px"; g.style.top=y+"px";
}

function moveGhost(x,y){
  const g=$("ghost");
  g.style.left=x+"px"; g.style.top=y+"px";
}

function hideGhost(){ $("ghost").style.display="none"; }

function move(ev){
  if(!state.drag) return;
  ev.preventDefault();
  const pt=getPoint(ev);
  moveGhost(pt.x, pt.y);
  clearDropHover();
  const tgt=elementAt(pt.x, pt.y);
  if(tgt && tgt.classList.contains("cell")) tgt.classList.add("drop-target");
}

function clearDropHover(){
  document.querySelectorAll(".cell.drop-target").forEach(e=>e.classList.remove("drop-target"));
}

function elementAt(x,y){
  $("ghost").style.display="none";
  const el=document.elementFromPoint(x,y);
  $("ghost").style.display="flex";
  return el;
}

function end(ev){
  document.removeEventListener("mousemove", move);
  document.removeEventListener("mouseup", end);
  document.removeEventListener("touchmove", move);
  document.removeEventListener("touchend", end);
  if(!state.drag){ hideGhost(); return; }
  const pt=getPoint(ev);
  const tgt=elementAt(pt.x, pt.y);
  clearDropHover();
  hideGhost();
  document.querySelectorAll(".tile.dragging").forEach(e=>e.classList.remove("dragging"));
  const drag=state.drag; state.drag=null;
  if(!tgt) return;
  // dropped on a board cell?
  if(tgt.classList.contains("cell")){
    const r=parseInt(tgt.dataset.r,10), c=parseInt(tgt.dataset.c,10);
    dropOnCell(drag.payload, r, c);
  } else if(tgt.classList.contains("rack") || tgt.closest(".rack")){
    // dropped back on rack — only meaningful if dragging from cell
    if(drag.payload.src==="cell") liftFromCell(drag.payload.r, drag.payload.c);
  }
}

function dropOnCell(payload, r, c){
  const target=state.grid[r][c];
  if(payload.src==="rack"){
    const i=payload.idx;
    if(state.rack[i].used) return;
    if(target){
      // swap: lift existing tile back to rack
      state.rack[target.tileIdx].used=false;
    }
    state.grid[r][c]={letter:state.rack[i].letter, tileIdx:i};
    state.rack[i].used=true;
  } else if(payload.src==="cell"){
    const from=state.grid[payload.r][payload.c];
    if(!from) return;
    if(payload.r===r && payload.c===c) return;
    if(target){
      // swap two cells
      state.grid[payload.r][payload.c]=target;
      state.grid[r][c]=from;
    } else {
      state.grid[payload.r][payload.c]=null;
      state.grid[r][c]=from;
    }
  }
  state.selectedTile=-1;
  renderRack(); renderBoard(); updateCount();
}

function liftFromCell(r,c){
  const cell=state.grid[r][c];
  if(!cell) return;
  state.rack[cell.tileIdx].used=false;
  state.grid[r][c]=null;
  renderRack(); renderBoard(); updateCount();
}

// ---------- CHECK / VALIDATE ----------
function extractWords(){
  const words=[], cells=[];
  for(let r=0;r<GRID;r++){
    let w="", group=[];
    for(let c=0;c<GRID;c++){
      const cell=state.grid[r][c];
      if(cell){ w+=cell.letter; group.push([r,c]); }
      else { if(w.length>=2){ words.push(w); cells.push(group.slice()); } w=""; group=[]; }
    }
    if(w.length>=2){ words.push(w); cells.push(group.slice()); }
  }
  for(let c=0;c<GRID;c++){
    let w="", group=[];
    for(let r=0;r<GRID;r++){
      const cell=state.grid[r][c];
      if(cell){ w+=cell.letter; group.push([r,c]); }
      else { if(w.length>=2){ words.push(w); cells.push(group.slice()); } w=""; group=[]; }
    }
    if(w.length>=2){ words.push(w); cells.push(group.slice()); }
  }
  return {words, cells};
}

function isConnected(){
  const placed=[];
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++) if(state.grid[r][c]) placed.push([r,c]);
  if(placed.length===0) return false;
  const seen=new Set(), key=(r,c)=>r+","+c;
  const q=[placed[0]]; seen.add(key(placed[0][0],placed[0][1]));
  while(q.length){
    const [r,c]=q.shift();
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=GRID||nc<0||nc>=GRID) return;
      if(!state.grid[nr][nc]) return;
      const k=key(nr,nc); if(seen.has(k)) return;
      seen.add(k); q.push([nr,nc]);
    });
  }
  return seen.size===placed.length;
}

function showResult(kind, msg){
  const r=$("result");
  r.className="result show "+kind;
  r.textContent=msg;
}
function hideResult(){ const r=$("result"); if(r){ r.className="result"; r.textContent=""; } }

function placedLetters(){
  const out=[];
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++) if(state.grid[r][c]) out.push(state.grid[r][c].letter);
  return out;
}
function placedCells(){
  const out=[];
  for(let r=0;r<GRID;r++
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++) if(state.grid[r][c]) out.push([r,c]);
  return out;
}

function extractWordsAndCells(){
  const words=[], cells=[];
  // rows
  for(let r=0;r<GRID;r++){
    let w="", group=[];
    for(let c=0;c<GRID;c++){
      const cell=state.grid[r][c];
      if(cell){ w+=cell.letter; group.push([r,c]); }
      else { if(w.length>=2){ words.push(w); cells.push(group.slice()); } w=""; group=[]; }
    }
    if(w.length>=2){ words.push(w); cells.push(group.slice()); }
  }
  // cols
  for(let c=0;c<GRID;c++){
    let w="", group=[];
    for(let r=0;r<GRID;r++){
      const cell=state.grid[r][c];
      if(cell){ w+=cell.letter; group.push([r,c]); }
      else { if(w.length>=2){ words.push(w); cells.push(group.slice()); } w=""; group=[]; }
    }
    if(w.length>=2){ words.push(w); cells.push(group.slice()); }

}
function clearBoard(){
  if(!confirm("Clear the board?")) return;
  state.grid=emptyGrid();
  state.rack.forEach(t=>t.used=false);
  state.selectedTile=-1;
  renderRack(); renderBoard(); updateCount(); hideResult();
}

async function checkSolution(){
  const placed=countPlaced();
  if(placed<12){ showResult("err",`Place all 12 tiles (${placed}/12).`); return; }
  if(!isConnected()){ showResult("err","All tiles must be connected (one crossword)."); return; }
  const {words, cells} = extractWordsAndCells();
  if(words.some(w=>w.length<3)){ showResult("err","All words must be 3+ letters."); return; }
  showResult("info","Checking…");
  try{
    const payload = {
      letters: state.letters,
      placed_letters: placedLetters(),
      words: words,
      cells: cells
    };
    const r=await fetch(`${BACKEND}/validate`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    if(!r.ok){
      const txt=await r.text();
      showResult("err",`Validate failed (HTTP ${r.status}). Words: ${words.join(", ")}`);
      console.error(txt);
      return;
    }
    const data=await r.json();
    if(data.valid){
      showResult("ok",`✅ SOLVED! ${words.length} valid words: ${words.join(", ")}`);
    } else {
      const bad=(data.invalid||data.invalid_words||[]).join(", ")||"see console";
      showResult("err",`❌ Not valid. Bad words: ${bad}`);
      console.log("validate response:",data);
    }
  } catch(e){
    showResult("err","Network error: "+e.message+". Words: "+words.join(", "));
  }
}
function onPointerDown(e){
  e.preventDefault();
  const el = e.currentTarget;
  const from = el.dataset.from;
  let letter, idx, srcR, srcC;
  if(from==="rack"){
    idx = parseInt(el.dataset.idx,10);
    if(state.rack[idx].used) return;
    letter = state.rack[idx].letter;
  } else if(from==="board"){
    srcR = parseInt(el.dataset.r,10);
    srcC = parseInt(el.dataset.c,10);
    const cell = state.grid[srcR][srcC];
    if(!cell) return;
    letter = cell.letter;
    idx = cell.tileIdx;
  } else return;

  state.drag = {from, idx, letter, srcR, srcC, lastTarget:null};
  el.classList.add("dragging");

  const ghost = $("ghost");
  ghost.textContent = letter;
  ghost.style.display = "flex";
  moveGhost(e.clientX, e.clientY);

  window.addEventListener("pointermove", onPointerMove);
  window.addEventListener("pointerup", onPointerUp, {once:true});
  window.addEventListener("pointercancel", onPointerUp, {once:true});
}

function moveGhost(x,y){
  const g=$("ghost");
  g.style.left = x+"px";
  g.style.top = y+"px";
}

function onPointerMove(e){
  if(!state.drag) return;
  moveGhost(e.clientX, e.clientY);
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const cell = el && el.classList && el.classList.contains("cell") ? el : null;
  if(state.drag.lastTarget && state.drag.lastTarget!==cell){
    state.drag.lastTarget.classList.remove("drop-target");
  }
  if(cell){
    cell.classList.add("drop-target");
    state.drag.lastTarget = cell;
  } else {
    state.drag.lastTarget = null;
  }
}
function onPointerUp(e){
  window.removeEventListener("pointermove", onPointerMove);
  if(!state.drag){ $("ghost").style.display="none"; return; }
  const drag = state.drag;
  state.drag = null;
  $("ghost").style.display="none";
  if(drag.lastTarget) drag.lastTarget.classList.remove("drop-target");

  // figure out the drop target
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const cellEl = el && el.classList && el.classList.contains("cell") ? el : null;
  const droppedOnRack = el && el.closest && el.closest("#rack");

  // remove from source
  if(drag.from==="board"){
    state.grid[drag.srcR][drag.srcC]=null;
    state.rack[drag.idx].used=false;
  } else if(drag.from==="rack"){
    // nothing yet; mark used only after successful placement
  }

  if(cellEl){
    const r=parseInt(cellEl.dataset.r,10);
    const c=parseInt(cellEl.dataset.c,10);
    if(state.grid[r][c]){
      // occupied — swap back: restore source if board, ignore if rack
      if(drag.from==="board"){
        state.grid[drag.srcR][drag.srcC]={letter:drag.letter,tileIdx:drag.idx};
        state.rack[drag.idx].used=true;
      }
    } else {
      state.grid[r][c]={letter:drag.letter,tileIdx:drag.idx};
      state.rack[drag.idx].used=true;
    }
  } else if(droppedOnRack){
    // returning to rack: tile is free now
    state.rack[drag.idx].used=false;
  } else {
    // dropped in empty space — restore if from board
    if(drag.from==="board"){
      state.grid[drag.srcR][drag.srcC]={letter:drag.letter,tileIdx:drag.idx};
      state.rack[drag.idx].used=true;
    }
  }

  state.selectedTile=-1;
  renderRack(); renderBoard(); updateCount(); hideResult();
}

renderMenu();
