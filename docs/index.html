<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Dice~Words</title>
<style>
/* ═══════════════════════════════════════════════
   Q~CROSS — NES / SNES RETRO THEME (refactor v2)
   Locked constraints:
     - Board is always 12×12
     - Dice are beige Q~Cross style (not blue, not bars, not pips)
     - Tiles populate immediately on game start
     - NES/SNES switchable any time
   ═══════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root{
  --ink:#e8eef7; --muted:#8899aa; --border:rgba(255,255,255,.12);
  --good:#2ee6a6; --danger:#ff5d7a; --accent:#7c5cff;
  --nes-bg:#0a0a1a; --nes-panel:#111128; --nes-tile:#f5f0e0;
  --nes-tile2:#c8c8d8; --nes-border:#3344aa; --nes-hi:#ffdd00;
  --nes-btn:#222244; --nes-btn-hi:#4455cc;
  --snes-bg:#1a0a2e; --snes-panel:#2a1040; --snes-tile:#fff3cc;
  --snes-tile2:#c8a85a; --snes-border:#cc44ff; --snes-hi:#ffaa00;
  --snes-btn:#3a1060; --snes-btn-hi:#8833cc;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{color:var(--ink);min-height:100vh;overscroll-behavior:none;}
.die,.cell{image-rendering:pixelated;}

/* ── NES ─────────────────────────────────── */
body.nes{
  background:var(--nes-bg);
  background-image:
    linear-gradient(rgba(30,40,120,.4) 1px,transparent 1px),
    linear-gradient(90deg,rgba(30,40,120,.4) 1px,transparent 1px);
  background-size:32px 32px;
  font-family:'Press Start 2P',ui-monospace,monospace;
}
body.nes .wrap{border-left:4px solid var(--nes-border);border-right:4px solid var(--nes-border);}
body.nes h1{color:var(--nes-hi);text-shadow:3px 3px 0 #000,-1px -1px 0 #3344aa;letter-spacing:2px;}
body.nes .sub{color:var(--muted);font-size:8px;letter-spacing:1px;}
body.nes .card{background:var(--nes-panel);border:3px solid var(--nes-border);border-radius:0;box-shadow:4px 4px 0 #000;}
body.nes button{font-family:'Press Start 2P',monospace;border-radius:0;background:var(--nes-btn);border:2px solid var(--nes-border);font-size:9px;padding:10px 12px;text-transform:uppercase;box-shadow:3px 3px 0 #000;color:var(--ink);}
body.nes button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}
body.nes button.good{background:#115533;border-color:var(--good);color:var(--good);box-shadow:3px 3px 0 #002211;}
body.nes button.primary{background:#112255;border-color:#4477ff;color:#88aaff;box-shadow:3px 3px 0 #001133;}
body.nes button.danger{background:#441122;border-color:var(--danger);color:var(--danger);box-shadow:3px 3px 0 #220011;}
body.nes button.active{background:var(--nes-btn-hi);border-color:var(--nes-hi);color:var(--nes-hi);}
body.nes .die.available{background:var(--nes-tile);color:#111;border:3px solid #887766;box-shadow:3px 3px 0 #000;}
body.nes .die.selected{border-color:var(--nes-hi);box-shadow:0 0 0 2px var(--nes-hi),3px 3px 0 #000;}
body.nes .die.used{background:#1a1a2a;color:#333;border:3px solid #222;box-shadow:none;}
body.nes .cell{border:2px solid #1a2255;background:#080818;}
body.nes .cell.filled{background:var(--nes-tile);border:3px solid #887766;box-shadow:2px 2px 0 #000;}
body.nes .cell.drop-target{background:#0a2a0a;border-color:var(--good);}
body.nes .cell.selected-cell{border-color:var(--nes-hi);background:#1a1a00;box-shadow:0 0 0 2px var(--nes-hi);}
body.nes .cell .letter,body.nes .die .letter{font-family:'Press Start 2P',monospace;color:#111;text-shadow:1px 1px 0 rgba(255,255,255,.3);}
body.nes #statusBar{border-radius:0;border-left:4px solid var(--nes-hi);background:#0a0a20;font-size:9px;}
body.nes #hintBox{font-size:9px;color:#aabbdd;line-height:1.8;}
body.nes .score-item .val{color:var(--nes-hi);}
body.nes .score-item .lbl{color:var(--muted);}
body.nes strong{color:var(--nes-hi);letter-spacing:1px;}
body.nes #tray{background:#080818;border:2px solid #1a2255;}
body.nes #board-wrap{background:#040410;border:3px solid #1a2255;}
body.nes #tray.drop-target{background:#0a2a0a;border:2px solid var(--good);}
/* ── SNES ────────────────────────────────── */
body.snes{
  background:var(--snes-bg);
  background-image:radial-gradient(ellipse at top,#2a1060 0%,#1a0a2e 60%,#0a0518 100%);
  font-family:system-ui,-apple-system,sans-serif;
}
body.snes h1{color:var(--snes-hi);text-shadow:2px 2px 8px rgba(255,150,0,.5),0 0 20px rgba(255,150,0,.3);}
body.snes .sub{color:#cc88ff;}
body.snes .card{background:linear-gradient(160deg,rgba(80,20,120,.6),rgba(40,10,80,.8));border:1px solid rgba(200,100,255,.3);border-radius:16px;box-shadow:0 8px 32px rgba(150,0,255,.2),inset 0 1px 0 rgba(255,255,255,.1);backdrop-filter:blur(12px);}
body.snes button{border-radius:8px;font-size:13px;background:linear-gradient(180deg,var(--snes-btn),#1e0840);border:1px solid rgba(200,100,255,.4);border-bottom:3px solid rgba(0,0,0,.45);box-shadow:inset 0 2px 0 rgba(255,255,255,.12),0 3px 0 rgba(0,0,0,.4),0 5px 12px rgba(0,0,0,.35);color:var(--ink);padding:10px 14px;}
body.snes button:active{transform:translateY(2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 4px 10px rgba(0,0,0,.35);}
body.snes button.good{background:linear-gradient(180deg,#1a6644,#0d3322);border-color:var(--good);box-shadow:inset 0 2px 0 rgba(100,255,180,.12),0 3px 0 rgba(0,0,0,.4),0 5px 12px rgba(0,0,0,.35);color:var(--good);}
body.snes button.primary{background:linear-gradient(180deg,#223388,#111844);border-color:#6688ff;box-shadow:inset 0 2px 0 rgba(120,160,255,.15),0 3px 0 rgba(0,0,0,.4),0 5px 12px rgba(0,0,0,.35);color:#aabbff;}
body.snes button.danger{background:linear-gradient(180deg,#661122,#330a11);border-color:var(--danger);box-shadow:inset 0 2px 0 rgba(255,100,100,.12),0 3px 0 rgba(0,0,0,.4),0 5px 12px rgba(0,0,0,.35);color:var(--danger);}
body.snes button.active{background:linear-gradient(180deg,var(--snes-btn-hi),#441088);border-color:var(--snes-hi);box-shadow:inset 0 2px 0 rgba(200,100,255,.18),0 3px 0 rgba(0,0,0,.4),0 5px 12px rgba(0,0,0,.35);color:var(--snes-hi);}
body.snes .die.available{background:linear-gradient(160deg,#fffff5 0%,#f5f0e2 55%,#e8e3d4 100%);color:#1a1a0a;border:2px solid #c8c0a8;border-right:3px solid #a8a090;border-bottom:3px solid #a8a090;box-shadow:inset 0 2px 0 rgba(255,255,255,.75),1px 4px 0 #908878,2px 7px 14px rgba(0,0,0,.35);font-weight:900;}
body.snes .die.selected{border-color:var(--snes-hi);box-shadow:0 0 0 3px var(--snes-hi),0 6px 16px rgba(0,0,0,.4);}
body.snes .die.used{background:linear-gradient(180deg,#2a1a3a,#1a0a28);color:#554466;border:2px solid #331a44;box-shadow:none;}
body.snes .cell{background:rgba(40,10,80,.5);border:2px solid rgba(150,50,220,.3);border-radius:4px;}
body.snes .cell.filled{background:linear-gradient(160deg,#fffff5 0%,#f5f0e2 55%,#e8e3d4 100%);border:2px solid #c8c0a8;border-right:3px solid #a8a090;border-bottom:3px solid #a8a090;box-shadow:inset 0 2px 0 rgba(255,255,255,.75),1px 3px 0 #908878;}
body.snes .cell.drop-target{background:rgba(46,230,166,.25);border-color:var(--good);box-shadow:0 0 12px rgba(46,230,166,.5);}
body.snes .cell.selected-cell{border-color:var(--snes-hi);background:rgba(255,150,0,.15);box-shadow:0 0 12px rgba(255,150,0,.3);}
body.snes .cell .letter,body.snes .die .letter{font-weight:900;color:#1a1a0a;text-shadow:0 1px 0 rgba(255,255,255,.5);}
body.snes #statusBar{border-radius:12px;border-left:3px solid var(--good);background:rgba(46,230,166,.06);}
body.snes #hintBox{color:#cc99ff;line-height:1.6;}
body.snes .score-item .val{color:var(--snes-hi);text-shadow:0 0 8px rgba(255,150,0,.5);}
body.snes strong{color:#ddaaff;}
body.snes #tray{background:rgba(0,0,0,.3);border:1px solid rgba(200,100,255,.2);border-radius:12px;}
body.snes #tray.drop-target{background:rgba(46,230,166,.1);border-color:var(--good);box-shadow:0 0 12px rgba(46,230,166,.3);}
body.snes #board-wrap{background:linear-gradient(180deg,#0a0020,#150030);border:3px solid rgba(150,50,220,.5);border-radius:8px;box-shadow:inset 0 0 30px rgba(100,0,200,.2);}

/* ── DICE ROLL ANIMATION ─────────────────── */
@keyframes diceRollNes{
  0%  {transform:rotate(0deg) scale(1);}
  16% {transform:rotate(-90deg) scale(1.4);}
  33% {transform:rotate(-180deg) scale(0.65);}
  50% {transform:rotate(-270deg) scale(1.35);}
  66% {transform:rotate(-360deg) scale(0.8);}
  83% {transform:rotate(-360deg) scale(1.2);}
  100%{transform:rotate(-360deg) scale(1);}
}
@keyframes diceRollSnes{
  0%  {transform:translateY(0) rotate(0deg) scale(1);}
  8%  {transform:translateY(-16px) rotate(-35deg) scale(1.45);}
  25% {transform:translateY(-8px) rotate(-160deg) scale(1.15);}
  45% {transform:translateY(8px) rotate(-340deg) scale(0.72);}
  60% {transform:translateY(-10px) rotate(-385deg) scale(1.25);}
  75% {transform:translateY(3px) rotate(-354deg) scale(0.94);}
  88% {transform:translateY(-2px) rotate(-358deg) scale(1.06);}
  100%{transform:translateY(0) rotate(-360deg) scale(1);}
}
body.nes .die.rolling{animation:diceRollNes 1s steps(6,end) both;}
body.snes .die.rolling{animation:diceRollSnes 1.3s cubic-bezier(.15,.6,.3,1) both;}
/* ── WIN SCREEN ──────────────────────────── */
#winScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9999;pointer-events:none;opacity:0;transition:opacity .6s;}
#winScreen.visible{opacity:1;}
#winScreen .win-card{pointer-events:auto;text-align:center;padding:24px 28px;max-width:340px;width:90%;}
.win-title{margin:0 0 10px;}
.win-words{font-size:14px;line-height:1.9;margin:8px 0;}
.win-score{font-size:32px;font-weight:bold;margin:6px 0 12px;}
body.nes #winScreen .win-card{background:var(--nes-panel);border:4px solid var(--nes-hi);box-shadow:6px 6px 0 #000;}
body.nes .win-title{color:var(--nes-hi);font-family:'Press Start 2P',monospace;font-size:clamp(10px,2.5vw,13px);text-shadow:2px 2px 0 #000;line-height:2;}
body.nes .win-score{color:var(--nes-hi);}
body.snes #winScreen .win-card{background:linear-gradient(160deg,rgba(80,20,140,.96),rgba(40,10,90,.98));border:2px solid rgba(255,170,0,.5);border-radius:20px;box-shadow:0 16px 48px rgba(100,0,200,.6),inset 0 1px 0 rgba(255,255,255,.15);}
body.snes .win-title{font-size:clamp(18px,4vw,26px);color:var(--snes-hi);text-shadow:2px 2px 12px rgba(255,150,0,.5);}
body.snes .win-score{color:var(--snes-hi);text-shadow:0 0 16px rgba(255,150,0,.5);}
/* ── SHARED LAYOUT ───────────────────────── */
.wrap{max-width:1100px;margin:0 auto;padding:16px;}
.top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
h1{margin:0;font-size:clamp(20px,4vw,40px);}
.sub{margin-top:2px;font-size:12px;}
.card{padding:14px;}
button{appearance:none;cursor:pointer;touch-action:manipulation;font:inherit;}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.hidden{display:none!important;}

#tray{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:6px;margin:10px 0;padding:8px;
  width:100%;
}
.die{
  aspect-ratio:1/1;width:100%;
  display:grid;place-items:center;
  font-weight:800;cursor:grab;user-select:none;
  transition:transform .1s,opacity .1s;
  touch-action:none;
  font-size:clamp(14px,4.2vw,20px);
}
.die.dragging{opacity:.3;}

#board-wrap{
  padding:6px;
  width:min(100%,640px,calc(100vh - 170px));
  aspect-ratio:1/1;
  margin:0 auto;
}
#board{
  display:grid;
  gap:3px;width:100%;height:100%;
}
.cell{
  aspect-ratio:1/1;width:100%;
  display:grid;place-items:center;
  cursor:pointer;
  transition:background .12s,border-color .12s,transform .12s;
  touch-action:manipulation;
  position:relative;
}
.cell .letter{pointer-events:none;}
.cell .rm{position:absolute;top:1px;right:3px;font-size:10px;color:var(--muted);cursor:pointer;display:none;}
.cell:hover .rm{display:block;}

.drag-ghost{
  position:fixed;pointer-events:none;z-index:9999;
  width:48px;height:48px;display:grid;place-items:center;
  font-weight:800;font-size:20px;border-radius:4px;
  transform:translate(-50%,-50%) scale(1.1);transition:none;
}

#statusBar{margin:10px 0;padding:10px 12px;border-left:4px solid var(--good);font-size:12px;line-height:1.6;}
#hintBox{margin:8px 0;min-height:20px;font-size:12px;line-height:1.6;}
.two{display:grid;grid-template-columns:min(320px,38vw) 1fr;gap:14px;align-items:start;}
@media(max-width:820px){
  .two{grid-template-columns:1fr;}
  #board-outer{order:-1;}
  #tray{grid-template-columns:repeat(6,1fr);gap:4px;}
  #tray .die{font-size:clamp(11px,3.8vw,16px);}
}
.score-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;}
.score-item{text-align:center;}
.score-item .lbl{font-size:9px;color:var(--muted);margin-top:2px;}
.score-item .val{font-size:20px;}
.footer{font-size:10px;margin-top:8px;color:var(--muted);}
#menuScreen{max-width:720px;margin:24px auto 0;}
input{width:100%;padding:10px;border:1px solid var(--border);background:#111;color:var(--ink);font-size:14px;}
hr{border:none;border-top:1px solid var(--border);margin:12px 0;}
.challenge-word{border-top:1px solid var(--border);padding:8px 0;}
.challenge-word-found{opacity:.6;}
.challenge-clue{font-size:12px;margin:4px 0 6px;line-height:1.5;}
.challenge-extra-hint{font-size:11px;color:var(--muted);margin:2px 0;font-style:italic;}
.challenge-revealed{font-weight:bold;color:var(--good);margin-left:6px;}
.challenge-found{font-weight:bold;color:var(--good);margin-left:6px;}
body.nes .cell.filled:is(.locked-t,.locked-b,.locked-l,.locked-r){box-shadow:0 0 6px var(--good),2px 2px 0 #000;}
body.nes .cell.filled.locked-t{border-top-color:var(--good);}
body.nes .cell.filled.locked-b{border-bottom-color:var(--good);}
body.nes .cell.filled.locked-l{border-left-color:var(--good);}
body.nes .cell.filled.locked-r{border-right-color:var(--good);}
body.snes .cell.filled:is(.locked-t,.locked-b,.locked-l,.locked-r){box-shadow:inset 0 2px 0 rgba(255,255,255,.75),1px 3px 0 #908878,0 0 12px rgba(46,230,166,.6);}
body.snes .cell.filled.locked-t{border-top-color:var(--good);}
body.snes .cell.filled.locked-b{border-bottom-color:var(--good);}
body.snes .cell.filled.locked-l{border-left-color:var(--good);}
body.snes .cell.filled.locked-r{border-right-color:var(--good);}
body.nes .die.available.found-tray{border-color:var(--good);box-shadow:0 0 0 2px var(--good),3px 3px 0 #000;}
body.snes .die.available.found-tray{border-color:var(--good);box-shadow:inset 0 2px 0 rgba(255,255,255,.75),1px 4px 0 #908878,2px 7px 14px rgba(0,0,0,.35),0 0 8px rgba(46,230,166,.5);}
body.nes #enterMyRollBtn{background:#d0aa4a;color:#1a1408;border-color:#8a6a20;box-shadow:3px 3px 0 #5a3a00;}
body.nes #enterMyRollBtn:active{background:#b89a50;}
body.snes #enterMyRollBtn{background:linear-gradient(180deg,#e8d5a0 0%,#d0aa4a 55%,#b89a50 100%);color:#1a1408;border:2px solid #8a6a20;border-bottom:3px solid #5a3a00;box-shadow:inset 0 2px 0 rgba(255,255,220,.5),0 4px 0 #5a3a00,2px 6px 14px rgba(0,0,0,.35);}
body.snes #enterMyRollBtn:active{transform:translateY(2px);box-shadow:inset 0 2px 0 rgba(255,255,220,.5),0 2px 0 #5a3a00;}
.cell.start-cell::after{content:'+';font-size:16px;opacity:.35;pointer-events:none;}
body.nes .cell.start-cell{border:2px dashed var(--nes-hi);opacity:.7;}
body.snes .cell.start-cell{border:2px dashed rgba(200,100,255,.7);opacity:.7;}
.cell.typing-cursor{outline:2px solid currentColor;outline-offset:-3px;}
body.nes .cell.typing-cursor{outline-color:var(--nes-hi);}
body.snes .cell.typing-cursor{outline-color:var(--snes-hi);box-shadow:0 0 8px var(--snes-hi);}
.cell.cursor-h::after{content:'→';position:absolute;bottom:1px;right:2px;font-size:8px;opacity:.5;pointer-events:none;}
.cell.cursor-v::after{content:'↓';position:absolute;bottom:1px;right:2px;font-size:8px;opacity:.5;pointer-events:none;}
</style>
</head>

<script>
(() => {
  const API = 'https://qcross-backend.onrender.com';
  const GRID_COLS = 12, GRID_ROWS = 12;
  const $ = id => document.getElementById(id);
  const state = {
    theme:'snes', mode:null, puzzle:null,
    letters:[], trayOrder:[], placed:{},
    selected:null, selectedCell:null, typingCursor:null, lastTypingDir:'h', hintN:0, hintCount:0,
    boardDim:9, boardOffset:{r:0,c:0},
    _lastDieTap:{idx:null,t:0},
    _lastCellTap:{key:null,t:0},
    challenge:{active:false,words:[],clues:[],wordLengths:[],wordCount:0,
               score:1000,extraHints:[],wordsRevealed:[],revealedAll:false,
               lockedWordKeys:[],wordsFound:[],foundDieIndices:[]},
  };

  let audioCtx=null, musicNode=null, musicTimer=null;
  let musicOn=false, soundOn=true, audioUnlocked=false;

  function getAudioCtx(){
    if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    return audioCtx;
  }
  function unlockAudio(){
    if(audioUnlocked) return;
    const c=getAudioCtx(); if(!c) return;
    if(c.state==='suspended'){ c.resume().catch(()=>{}); }
    try{
      const o=c.createOscillator(), g=c.createGain();
      g.gain.value=0; o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime+0.01);
    }catch(e){}
    audioUnlocked=true;
  }
  function stopBgMusic(){
    if(musicTimer){clearTimeout(musicTimer);musicTimer=null;}
    if(musicNode){try{musicNode.stop();}catch(e){}try{musicNode.disconnect();}catch(e){}musicNode=null;}
  }
  function playMusic(mode){
    stopBgMusic();
    if(!musicOn) return;
    const c=getAudioCtx(); if(!c) return;
    let step=0;
    const pattern = mode==='nes' ? [262,330,392,523,392,330,294,370] : [261,329,392,494,392,329,294,370];
    function tick(){
      if(!musicOn) return;
      if(musicNode){try{musicNode.stop();}catch(e){}try{musicNode.disconnect();}catch(e){}musicNode=null;}
      const osc=c.createOscillator(), gain=c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = mode==='nes' ? 'square' : 'sine';
      osc.frequency.value = pattern[step%pattern.length];
      gain.gain.setValueAtTime(mode==='nes' ? 0.035 : 0.02, c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime+(mode==='nes'?0.16:0.42));
      osc.start(c.currentTime);
      osc.stop(c.currentTime+(mode==='nes'?0.17:0.43));
      musicNode=osc; step++;
      musicTimer=setTimeout(tick, mode==='nes' ? 180 : 440);
    }
    tick();
  }
  function blip(freqs, type, vol){
    const c=getAudioCtx(); if(!c||!soundOn) return;
    freqs.forEach((f,i)=>{
      const o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type=type; o.frequency.value=f;
      g.gain.setValueAtTime(vol, c.currentTime+i*0.06);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+i*0.06+0.05);
      o.start(c.currentTime+i*0.06);
      o.stop(c.currentTime+i*0.06+0.06);
    });
  }
  const SFX = {
    nes:{
      select:()=>blip([440,660],'square',0.08),
      place: ()=>{ const r=0.82+Math.random()*0.4; blip([523*r,659*r],'square',0.08); },
      move:  ()=>blip([392],'square',0.08),
      remove:()=>blip([262],'square',0.08),
      menu:  ()=>blip([330],'square',0.06),
      roll:  ()=>blip([196,262,330,392],'square',0.06),
      hint:  ()=>blip([523,392],'square',0.06),
      validate:()=>blip([523,659,784],'square',0.07),
      clear: ()=>blip([200,150],'square',0.06),
      error: ()=>blip([110],'square',0.08),
    },
    snes:{
      select:()=>blip([523,659],'sine',0.05),
      place: ()=>{ const r=0.82+Math.random()*0.4; blip([659*r,784*r],'sine',0.05); },
      move:  ()=>blip([440],'sine',0.05),
      remove:()=>blip([330],'triangle',0.05),
      menu:  ()=>blip([440],'sine',0.04),
      roll:  ()=>blip([261,329,392,523],'sine',0.04),
      hint:  ()=>blip([659,494],'sine',0.04),
      validate:()=>blip([659,784,988],'sine',0.05),
      clear: ()=>blip([220,165],'sine',0.04),
      error: ()=>blip([120],'sine',0.06),
    }
  };
  function sfx(n){ if(!soundOn) return; try{ const s=SFX[state.theme]; if(s&&s[n]) s[n](); }catch(e){} }

  function launchFireworks(){
    playFanfare();
    setTimeout(showWinScreen, 2000);
    const canvas=$('fireworksCanvas');
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    const ctx=canvas.getContext('2d');
    const nes=state.theme==='nes';
    const COLORS=nes
      ?['#00ff44','#00ccff','#ffff00','#ff4488','#ff8800','#ffffff']
      :['#ffe040','#46e6a6','#cc88ff','#ff88aa','#88aaff','#ffffcc'];
    let particles=[];
    function burst(x,y){
      const color=COLORS[Math.floor(Math.random()*COLORS.length)];
      const count=nes?48:60;
      for(let i=0;i<count;i++){
        const angle=(Math.PI*2/count)*i+(Math.random()-.5)*.25;
        const speed=1.8+Math.random()*5;
        particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
          life:1,decay:.011+Math.random()*.009,r:nes?3:2+Math.random()*2.5,color});
      }
    }
    let startTime=null, lastBurst=-9999;
    const DURATION=4200;
    function frame(ts){
      if(!startTime) startTime=ts;
      const elapsed=ts-startTime;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      if(ts-lastBurst>650 && elapsed<DURATION-600){
        const x=canvas.width*(0.15+Math.random()*0.7);
        const y=canvas.height*(0.15+Math.random()*0.5);
        burst(x,y); lastBurst=ts;
      }
      particles=particles.filter(p=>p.life>0);
      for(const p of particles){
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.07; p.vx*=0.99; p.life-=p.decay;
        ctx.globalAlpha=Math.max(0,p.life);
        ctx.fillStyle=p.color;
        if(nes){ ctx.fillRect(p.x-p.r/2,p.y-p.r/2,p.r,p.r); }
        else{ ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }
      }
      ctx.globalAlpha=1;
      if(elapsed<DURATION||particles.length>0){ requestAnimationFrame(frame); }
      else{ canvas.style.opacity='0'; }
    }
    canvas.style.opacity='1';
    burst(canvas.width*.5, canvas.height*.35);
    lastBurst=0;
    requestAnimationFrame(frame);
  }

  function playRollSound(){
    if(!soundOn) return;
    const c=getAudioCtx(); if(!c) return;
    const nes=state.theme==='nes';
    const bufLen=Math.ceil(c.sampleRate*0.08);
    const buf=c.createBuffer(1,bufLen,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) d[i]=Math.random()*2-1;
    [0,.07,.14,.23,.33,.44,.57,.71,.86,1.02,1.17,1.31,1.44].forEach((t,i,a)=>{
      const src=c.createBufferSource(); src.buffer=buf;
      const filt=c.createBiquadFilter();
      filt.type='bandpass';
      filt.frequency.value=300+Math.random()*(nes?800:500);
      filt.Q.value=nes?1.5:2.2;
      const g=c.createGain();
      const vol=(nes?.45:.3)*(1-i/a.length*.65);
      g.gain.setValueAtTime(0,c.currentTime+t);
      g.gain.linearRampToValueAtTime(vol,c.currentTime+t+.004);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+.048);
      src.connect(filt);filt.connect(g);g.connect(c.destination);
      src.start(c.currentTime+t);src.stop(c.currentTime+t+.06);
    });
  }

  function playFanfare(){
    if(!soundOn) return;
    const c=getAudioCtx(); if(!c) return;
    const nes=state.theme==='nes';
    function n(t,freq,dur,vol){
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type=nes?'square':'sine';o.frequency.value=freq;
      g.gain.setValueAtTime(vol,c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+dur);
      o.start(c.currentTime+t);o.stop(c.currentTime+t+dur+0.05);
    }
    if(nes){
      n(0,523,.09,.11);n(.07,659,.09,.11);n(.14,784,.09,.11);
      n(.21,1047,.24,.13);
      n(.30,784,.07,.09);n(.37,988,.07,.09);
      n(.44,1047,.55,.14);
    } else {
      n(0,523,.13,.06);n(.10,659,.13,.06);n(.20,784,.13,.06);
      n(.32,1047,.38,.08);n(.32,784,.38,.03);
      n(.45,880,.10,.05);
      n(.55,1047,.65,.09);n(.55,659,.65,.04);
    }
  }

  function showWinScreen(){
    const ex=document.getElementById('winScreen');
    if(ex) ex.remove();
    const ch=state.challenge.active;
    const outer=document.createElement('div');
    outer.id='winScreen';
    const card=document.createElement('div');
    card.className='win-card card';
    if(ch){
      const sch=state.challenge;
      const diff=challengeDifficulty(sch);
      const hintsUsed=sch.extraHints.reduce((s,h)=>s+h.length,0);
      const revealsUsed=sch.wordsRevealed.filter(Boolean).length;
      const hintDeduct=hintsUsed*100;
      const revealDeduct=sch.revealedAll?400:revealsUsed*250;
      let breakdown='';
      if(hintDeduct) breakdown+='<div style="font-size:11px;color:var(--muted)">−'+hintDeduct+' pts ('+hintsUsed+' hint'+(hintsUsed!==1?'s':'')+')</div>';
      if(revealDeduct) breakdown+='<div style="font-size:11px;color:var(--muted)">−'+revealDeduct+' pts ('+(sch.revealedAll?'reveal all':revealsUsed+' reveal'+(revealsUsed!==1?'s':''))+')</div>';
      card.innerHTML=
        '<div class="win-title">Challenge<br>Complete!</div>'+
        '<div style="margin-bottom:6px"><span style="font-size:11px;padding:2px 8px;border-radius:10px;background:'+diff.color+';color:#000;font-weight:bold">'+diff.label+'</span></div>'+
        '<div class="win-score">'+sch.score+' pts</div>'+
        (breakdown?'<div style="margin:-6px 0 10px">'+breakdown+'</div>':'')+
        '<div class="win-words">All '+sch.wordCount+' word'+(sch.wordCount!==1?'s':'')+' found!</div>'+
        '<div class="row" style="justify-content:center;margin-top:14px">'+
          '<button id="winMenuBtn">Menu</button>'+
        '</div>';
    } else {
      const words=collectRuns(state.placed).filter(r=>r.word.length>=3).map(r=>r.word.toUpperCase());
      const hints=state.hintCount;
      card.innerHTML=
        '<div class="win-title">Puzzle Solved!</div>'+
        '<div class="win-words">'+words.join(' · ')+'</div>'+
        (hints?'<div class="sub" style="margin:8px 0">Hints used: '+hints+'</div>':'')+
        '<div class="row" style="justify-content:center;gap:12px;margin-top:14px">'+
          '<button id="winNewRollBtn" class="good">New Roll</button>'+
          '<button id="winMenuBtn">Menu</button>'+
        '</div>';
    }
    outer.appendChild(card);
    document.body.appendChild(outer);
    requestAnimationFrame(()=>outer.classList.add('visible'));
    document.getElementById('winMenuBtn').onclick=()=>{outer.remove();showMenu();};
    const nrb=document.getElementById('winNewRollBtn');
    if(nrb) nrb.onclick=()=>{outer.remove();newRoll();};
  }

  function toggleMusic(){
    unlockAudio();
    musicOn=!musicOn;
    const b=$('musicBtn'); if(b) b.textContent = musicOn ? '♪ ON' : '♪ OFF';
    stopBgMusic();
    if(musicOn) playMusic(state.theme);
  }
  function toggleSound(){
    unlockAudio();
    soundOn=!soundOn;
    const b=$('soundBtn'); if(b){ b.textContent = soundOn ? 'SFX ON' : 'SFX OFF'; b.style.opacity = soundOn ? '1' : '0.45'; }
  }

  function setTheme(t){
    sfx('menu');
    state.theme=t;
    document.body.className=t;
    $('nesBtn').classList.toggle('active',t==='nes');
    $('snesBtn').classList.toggle('active',t==='snes');
    stopBgMusic();
    if(musicOn) playMusic(t);
  }
  const DICE_FACES=[
    ["M","M","L","L","B","Y"],["V","E","G","K","P","P"],["H","H","N","N","R","R"],
    ["D","F","R","L","L","W"],["R","R","D","L","G","G"],["X","K","B","S","Z","N"],
    ["W","H","H","T","T","P"],["C","C","B","T","J","D"],["C","C","M","T","T","S"],
    ["O","I","I","N","N","Y"],["A","E","I","O","U","U"],["A","A","E","E","O","O"]
  ];
  function isValidDiceRoll(letters){
    if(letters.length!==12) return false;
    // Sort most-constrained letters first for faster backtracking
    const sorted=[...letters].sort((a,b)=>
      DICE_FACES.filter(d=>d.includes(a)).length-DICE_FACES.filter(d=>d.includes(b)).length
    );
    const used=new Array(12).fill(false);
    function match(i){
      if(i===12) return true;
      for(let d=0;d<12;d++){
        if(!used[d]&&DICE_FACES[d].includes(sorted[i])){
          used[d]=true; if(match(i+1)) return true; used[d]=false;
        }
      }
      return false;
    }
    return match(0);
  }
  function validateManualLetters(){
    const raw=($('manualLetters').value||'').toUpperCase().replace(/[^A-Z]/g,'').slice(0,12);
    $('manualLetters').value=raw;
    const btn=$('startClassic');
    if(btn._isPhysical){
      const valid=isValidDiceRoll(raw.split(''));
      btn.disabled=!valid;
      $('scanStatus').textContent=raw.length<12
        ? raw.length+'/12 letters entered.'
        : valid ? '✓ Valid — review and start when ready.' : '⚠ Letters don\'t match valid dice — check the scan result and correct any misread letters.';
    }
  }

  const DICE=[
    ['M','M','L','L','B','Y'],['V','E','G','K','P','P'],['H','H','N','N','R','R'],
    ['D','F','R','L','L','W'],['R','R','D','L','G','G'],['X','K','B','S','Z','N'],
    ['W','H','H','T','T','P'],['C','C','B','T','J','D'],['C','C','M','T','T','S'],
    ['O','I','I','N','N','Y'],['A','E','I','O','U','U'],['A','A','E','E','O','O']

  function renderTray(){
    const ch=state.challenge;
    const foundDice=new Set(ch.active ? ch.foundDieIndices : []);
    const tray=$('tray'); tray.innerHTML='';
    state.trayOrder.forEach(i=>{
      const l=state.letters[i];
      const used=Object.values(state.placed).some(p=>p.dieIdx===i);
      const foundInTray=!used&&foundDice.has(i);
      const div=document.createElement('div');
      div.className='die '+(used?'used':'available')+(state.selected===i?' selected':'')+(foundInTray?' found-tray':'');
      div.textContent=l; div.dataset.idx=i;
      if(!used){ div.addEventListener('pointerdown', onDiePointerDown); }

    });
    $('placedCount').textContent=Object.keys(state.placed).length;
    $('placedScore').textContent=Object.keys(state.placed).length;

  function getMinDim(){ return window.innerWidth<=820 ? 7 : 9; }

  function ensureBoardFits(){
    const allCoords=Object.keys(state.placed).map(k=>k.split(',').map(Number));
    if(state.typingCursor) allCoords.push([state.typingCursor.r,state.typingCursor.c]);
    if(!allCoords.length) return;
    const minR=Math.min(...allCoords.map(([r])=>r));
    const maxR=Math.max(...allCoords.map(([r])=>r));
    const minC=Math.min(...allCoords.map(([,c])=>c));
    const maxC=Math.max(...allCoords.map(([,c])=>c));
    // Grow to fit content + 1-cell buffer each side, max 12×12
    state.boardDim=Math.min(Math.max(state.boardDim,maxR-minR+3,maxC-minC+3,getMinDim()),12);
    const dim=state.boardDim,h=Math.floor(dim/2);
    let {r:ro,c:co}=state.boardOffset;
    // Shift origin to keep 1-cell buffer between content and viewport edge
    if(minR<ro-h+1)            ro=minR+h-1;
    else if(maxR>ro-h+dim-2)   ro=maxR-(dim-2-h);
    if(minC<co-h+1)            co=minC+h-1;
    else if(maxC>co-h+dim-2)   co=maxC-(dim-2-h);
    // Safety: if buffer can't fit (content fills full 12×12), just keep content visible
    if(minR<ro-h)              ro=minR+h;
    else if(maxR>ro-h+dim-1)   ro=maxR-(dim-1-h);
    if(minC<co-h)              co=minC+h;
    else if(maxC>co-h+dim-1)   co=maxC-(dim-1-h);
    state.boardOffset={r:ro,c:co};
  }

  function renderBoard(){
    const lockedKeySet=new Set();
    if(state.challenge.active)
      state.challenge.lockedWordKeys.forEach(ks=>{ if(ks) ks.forEach(k=>lockedKeySet.add(k)); });

    ensureBoardFits();
    const tc=state.typingCursor;
    const dim=state.boardDim, h=Math.floor(dim/2);
    const ro=state.boardOffset.r, co=state.boardOffset.c;
    const r0=ro-h, r1=r0+dim-1, c0=co-h, c1=c0+dim-1;

    const wrap=$('board-wrap');
    // On mobile the board-outer is full-width; on desktop ~60% of viewport
    const isMobile=window.innerWidth<=820;
    const containerW=wrap.clientWidth||(isMobile?window.innerWidth-28:Math.round(window.innerWidth*0.55));
    const estCell=Math.floor((containerW-12-3*(dim-1))/dim);
    const fontSize=Math.max(10,Math.min(22,Math.round(estCell*0.48)))+'px';

    const noTiles=Object.keys(state.placed).length===0&&!state.typingCursor;
    const board=$('board');
    board.style.gridTemplateColumns=`repeat(${dim},1fr)`;
    board.style.gridTemplateRows=`repeat(${dim},1fr)`;
    board.style.fontSize=fontSize;
    board.innerHTML='';

    for(let r=r0;r<=r1;r++){
      for(let c=c0;c<=c1;c++){
        const key=r+','+c;
        const cell=document.createElement('div');
        let cls='cell'+(state.placed[key]?' filled':'')+(state.selectedCell===key?' selected-cell':'');
        if(noTiles && r===0 && c===0) cls+=' start-cell';
        if(tc && tc.r===r && tc.c===c){
          cls+=' typing-cursor cursor-'+(tc.dir==='h'?'h':'v');
        }
        if(lockedKeySet.has(key)){
          cls+=' locked';
          if(!lockedKeySet.has((r-1)+','+c)) cls+=' locked-t';
          if(!lockedKeySet.has((r+1)+','+c)) cls+=' locked-b';
          if(!lockedKeySet.has(r+','+(c-1))) cls+=' locked-l';
          if(!lockedKeySet.has(r+','+(c+1))) cls+=' locked-r';
        }
        cell.className=cls;
        cell.dataset.key=key;
        if(state.placed[key]){
          const span=document.createElement('span'); span.className='letter';
          span.textContent=state.placed[key].letter;
          cell.appendChild(span);
        }
        cell.addEventListener('pointerdown', onCellPointerDown);
        board.appendChild(cell);
      }
    }
  }
  let drag=null;
  function makeGhost(letter){
    const g=document.createElement('div');

    g.textContent=letter;
    document.body.appendChild(g);
    return g;
  }
  function moveGhost(g,x,y){ g.style.left=x+'px'; g.style.top=y+'px'; }
  function targetCellAt(x,y){
    const el=document.elementFromPoint(x,y);
    return el && el.closest('.cell');

  function clearDropHighlight(){
    if(drag && drag.lastTarget){ drag.lastTarget.classList.remove('drop-target'); drag.lastTarget=null; }

  function onDiePointerDown(e){
    unlockAudio();
    const idx=parseInt(e.currentTarget.dataset.idx);
    e.preventDefault();
    try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){}
    drag={fromTrayIdx:idx, ghost:makeGhost(state.letters[idx]), lastTarget:null, moved:false, startX:e.clientX, startY:e.clientY};
    e.currentTarget.classList.add('dragging');

    document.addEventListener('pointerup', onPointerUp, {once:true});
    document.addEventListener('pointercancel', onPointerUp, {once:true});

  function onCellPointerDown(e){
    unlockAudio();
    const key=e.currentTarget.dataset.key;
    const placed = state.placed[key];

    // Clear stale selectedCell if that cell no longer has a tile
    if(state.selectedCell && !state.placed[state.selectedCell]) state.selectedCell=null;

    // Double-tap: on a found word → return whole word to tray; otherwise normal return
    const now=Date.now();
    if(placed && state._lastCellTap.key===key && now-state._lastCellTap.t<350){
      state._lastCellTap={key:null,t:0};
      if(state.challenge.active){
        const lockedIdx=state.challenge.lockedWordKeys.findIndex(ks=>ks&&ks.includes(key));
        if(lockedIdx>=0){ returnLockedWordToTray(lockedIdx); return; }
      }
      removePlaced(key); return;
    }
    state._lastCellTap = placed ? {key,t:now} : {key:null,t:0};

    if(state.selected!==null && !placed){
      placeDie(state.selected, key);
      return;
    }
    if(state.selected!==null && placed){
      $('statusBar').textContent='That cell is occupied — tap an empty cell to place "'+state.letters[state.selected]+'"';
      $('statusBar').classList.remove('hidden');
      return;
    }
    if(state.selectedCell){
      if(key===state.selectedCell){ clearCellSelection(); return; }
      moveOrSwap(state.selectedCell, key);
      clearCellSelection();
      return;
    }
    if(placed){
      state.typingCursor=null;
      e.preventDefault();
      try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){}
      drag={fromCellKey:key, ghost:makeGhost(placed.letter), lastTarget:null, moved:false, startX:e.clientX, startY:e.clientY};
      moveGhost(drag.ghost, e.clientX, e.clientY);
      document.addEventListener('pointermove', onPointerMove);
      document.addEventListener('pointerup', onPointerUp, {once:true});
      document.addEventListener('pointercancel', onPointerUp, {once:true});
      return;
    }
    // Empty cell, nothing selected: set/toggle typing cursor
    {
      const [r,c]=key.split(',').map(Number);
      if(state.typingCursor && state.typingCursor.r===r && state.typingCursor.c===c){
        state.typingCursor.dir=state.typingCursor.dir==='h'?'v':'h';
      } else {

      }
      renderBoard();
    }
  }

  function onPointerMove(e){
    if(!drag) return;
    if(!drag.moved){
      const dx=e.clientX-drag.startX, dy=e.clientY-drag.startY;
      if(dx*dx+dy*dy < 36) return;
      drag.moved=true;
    }
    moveGhost(drag.ghost, e.clientX, e.clientY);
    if(drag.fromCellKey){
      const trayEl=$('tray'), r=trayEl.getBoundingClientRect();
      const over=e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom;
      if(over){
        if(drag.lastTarget){drag.lastTarget.classList.remove('drop-target');drag.lastTarget=null;}
        if(!drag.trayTarget){trayEl.classList.add('drop-target');drag.trayTarget=trayEl;}
        return;
      } else if(drag.trayTarget){
        drag.trayTarget.classList.remove('drop-target');drag.trayTarget=null;
      }
    }
    const t = targetCellAt(e.clientX, e.clientY);
    if(t!==drag.lastTarget){
      clearDropHighlight();
      if(t){
        const occ = state.placed[t.dataset.key];
        if(!occ || drag.fromCellKey){
          t.classList.add('drop-target');
          drag.lastTarget=t;
        }
      }
    }
  }

  function onPointerUp(e){
    document.removeEventListener('pointermove', onPointerMove);
    if(!drag) return;
    const d = drag;
    const target = drag.lastTarget;
    const trayTarget = drag.trayTarget;
    clearDropHighlight();
    if(drag.ghost){ drag.ghost.remove(); }
    document.querySelectorAll('.die.dragging').forEach(x=>x.classList.remove('dragging'));
    drag=null;

    if(!d.moved){
      if(d.fromTrayIdx!=null){
        selectDie(d.fromTrayIdx);
      } else if(d.fromCellKey){
        state.selectedCell = d.fromCellKey;
        state.selected = null;
        renderTray(); renderBoard();
        $('statusBar').textContent='Tap another cell to move "'+state.placed[d.fromCellKey].letter+'" — tap same cell to cancel.';
        $('statusBar').classList.remove('hidden');
      }
      return;
    }

    if(trayTarget && d.fromCellKey){ removePlaced(d.fromCellKey); return; }
    if(!target) return;
    const key=target.dataset.key;
    if(d.fromTrayIdx!=null){
      if(!state.placed[key]) placeDie(d.fromTrayIdx, key);
    } else if(d.fromCellKey){
      if(d.fromCellKey===key) return;
      moveOrSwap(d.fromCellKey, key);
    }
  }

  function moveOrSwap(fromKey, toKey){
    if(!state.placed[fromKey]) return;
    sfx('move');
    if(!state.placed[toKey]){
      state.placed[toKey]=state.placed[fromKey];
      delete state.placed[fromKey];
    } else {
      const tmp=state.placed[toKey];
      state.placed[toKey]=state.placed[fromKey];
      state.placed[fromKey]=tmp;
    }
    const newLock=checkChallengeWordLocks();
    renderTray(); renderBoard();
    if(newLock){ renderChallengePanel(); if(state.challenge.wordsFound.every(f=>f)&&!collectRuns(state.placed).some(r=>r.word.length===2)) launchFireworks(); }
  }

  function selectDie(i){

  function clearCellSelection(){ state.selectedCell=null; $('statusBar').classList.add('hidden'); renderBoard(); }
  function isAdjacentToPlaced(key){
    const [r,c]=key.split(',').map(Number);
    return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].some(([nr,nc])=>state.placed[nr+','+nc]);
  }
  function placeDie(idx, key){

  function removePlaced(key){

  function shuffleTray(){
    sfx('select');
    const placed=new Set(Object.values(state.placed).map(p=>p.dieIdx));
    const unplaced=state.trayOrder.filter(i=>!placed.has(i));
    for(let i=unplaced.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [unplaced[i],unplaced[j]]=[unplaced[j],unplaced[i]];
    }
    let ui=0;
    state.trayOrder=state.trayOrder.map(i=>placed.has(i)?i:unplaced[ui++]);
    renderTray();
    requestAnimationFrame(()=>{
      [...document.querySelectorAll('#tray .die.available')].forEach((die,i)=>{
        setTimeout(()=>{
          die.classList.add('rolling');

        }, i*60);

  }

  let wordSet=null;
  async function loadWordSet(){

    if(!r.ok) throw new Error('HTTP '+r.status);

  function isConnected(placed){
    const keys=Object.keys(placed);
    if(!keys.length) return true;
    const keySet=new Set(keys), visited=new Set(), queue=[keys[0]];
    visited.add(keys[0]);
    while(queue.length){
      const k=queue.shift(), [r,c]=k.split(',').map(Number);
      for(const [nr,nc] of [[r-1,c],[r+1,c],[r,c-1],[r,c+1]]){
        const nk=nr+','+nc;
        if(keySet.has(nk)&&!visited.has(nk)){ visited.add(nk); queue.push(nk); }
      }
    }
    return visited.size===keys.length;
  }
  function collectRuns(placed){
    const g={};
    Object.entries(placed).forEach(([k,v])=>{ g[k]=v.letter; });
    const keys=Object.keys(placed);
    if(!keys.length) return [];
    const rows=keys.map(k=>+k.split(',')[0]), cols=keys.map(k=>+k.split(',')[1]);
    const minR=Math.min(...rows), maxR=Math.max(...rows);
    const minC=Math.min(...cols), maxC=Math.max(...cols);
    const runs=[];
    for(let r=minR;r<=maxR;r++){
      let w='',ks=[];
      for(let c=minC;c<=maxC;c++){
        const l=g[r+','+c];
        if(l){w+=l;ks.push(r+','+c);}else{if(w){runs.push({word:w,keys:[...ks]});w='';ks=[];}}
      }
      if(w) runs.push({word:w,keys:[...ks]});
    }
    for(let c=minC;c<=maxC;c++){
      let w='',ks=[];
      for(let r=minR;r<=maxR;r++){
        const l=g[r+','+c];
        if(l){w+=l;ks.push(r+','+c);}else{if(w){runs.push({word:w,keys:[...ks]});w='';ks=[];}}
      }
      if(w) runs.push({word:w,keys:[...ks]});
    }
    return runs;
  }
  async function validate(){
    sfx('validate');
    const placed=state.placed;
    const total=Object.keys(placed).length;
    if(total<12){
      $('statusBar').textContent='Place all 12 letters before validating. ('+total+'/12 placed)';
      $('statusBar').classList.remove('hidden'); return;
    }
    if(!isConnected(placed)){
      $('statusBar').textContent='Tiles are not all connected — every tile must touch at least one other tile.';
      $('statusBar').classList.remove('hidden'); return;
    }
    const runs=collectRuns(placed);
    const twoLetterRuns=runs.filter(r=>r.word.length===2);
    if(twoLetterRuns.length){
      $('statusBar').textContent='2-letter sequences aren\'t valid: '+twoLetterRuns.map(r=>r.word.toUpperCase()).join(', ')+'.';
      $('statusBar').classList.remove('hidden'); return;
    }
    const wordRuns=runs.filter(run=>run.word.length>=3);
    const covered=new Set(wordRuns.flatMap(run=>run.keys));
    const uncovered=Object.keys(placed).filter(k=>!covered.has(k));
    if(uncovered.length){
      const letters=[...new Set(uncovered.map(k=>placed[k].letter))].join(', ');
      $('statusBar').textContent='These tiles aren\'t part of any 3+ letter word: '+letters+'.';
      $('statusBar').classList.remove('hidden'); return;
    }
    const words=wordRuns.map(run=>run.word);
    $('statusBar').textContent='Checking dictionary…'; $('statusBar').classList.remove('hidden');
    let ws;
    try{ ws=await loadWordSet(); }
    catch(e){
      $('statusBar').textContent='Words found: '+words.join(', ')+' — dictionary unavailable on local file. Push to GitHub Pages to check spelling.';
      return;
    }
    const bad=words.filter(w=>!ws.has(w.toLowerCase()));
    const good=words.filter(w=>ws.has(w.toLowerCase()));
    if(bad.length){
      $('statusBar').textContent='Not in word list: '+bad.join(', ')+'. Keep trying!';
    } else if(state.challenge.active){
      $('statusBar').textContent='Solved! Words: '+good.join(', ')+' — Final score: '+state.challenge.score+' pts!';
      launchFireworks();
    } else {
      $('statusBar').textContent='All words valid: '+good.join(', ')+'!';
      launchFireworks();
    }
  }
  function checkChallengeWordLocks(){
    if(!state.challenge.active) return false;
    const ch=state.challenge;
    const runs=collectRuns(state.placed);
    const prev=[...ch.wordsFound];
    ch.lockedWordKeys=ch.words.map(()=>null);
    ch.wordsFound=ch.words.map(()=>false);
    ch.words.forEach((word,i)=>{
      const match=runs.find(r=>r.word.toUpperCase()===word.toUpperCase());
      if(match){
        ch.lockedWordKeys[i]=match.keys;
        ch.wordsFound[i]=true;
        match.keys.forEach(k=>{ if(state.placed[k]) ch.foundDieIndices.add(state.placed[k].dieIdx); });
      }
    });
    const newLock=ch.wordsFound.some((f,i)=>f&&!prev[i]);
    if(newLock) sfx('validate');
    return newLock;
  }

  function returnLockedWordToTray(wordIdx){
    const ch=state.challenge;
    const keys=ch.lockedWordKeys[wordIdx];
    if(!keys) return;
    keys.forEach(k=>delete state.placed[k]);
    sfx('remove');
    checkChallengeWordLocks();
    renderTray(); renderBoard(); renderChallengePanel();
    $('statusBar').textContent='Word returned to tray — tiles highlighted green.';
    $('statusBar').classList.remove('hidden');
  }

  function challengeDifficulty(ch){
    const n=ch.wordCount, avg=ch.wordLengths.reduce((s,l)=>s+l,0)/n;
    if(n===1||avg>8) return {label:'Hard',color:'var(--danger)'};
    if(n===3&&avg<=5.5) return {label:'Easy',color:'var(--good)'};
    return {label:'Medium',color:'var(--snes-hi)'};
  }

  function renderChallengePanel(){
    const ch=state.challenge;
    const diff=challengeDifficulty(ch);
    $('challengeTitle').innerHTML='Challenge &mdash; '+ch.wordCount+' word'+(ch.wordCount!==1?'s':'')+
      ' <span style="font-size:10px;padding:2px 7px;border-radius:10px;background:'+diff.color+
      ';color:#000;opacity:.85;margin-left:4px;font-weight:bold">'+diff.label+'</span>';
    $('challengeScore').textContent=ch.score;
    const el=$('challengeClues'); el.innerHTML='';
    // Unsolved clues first, found clues at the bottom
    const order=ch.words.map((_,i)=>i).sort((a,b)=>(ch.wordsFound[a]?1:0)-(ch.wordsFound[b]?1:0));
    order.forEach(i=>{
      const word=ch.words[i];
      const revealed=ch.wordsRevealed[i];
      const found=ch.wordsFound[i];
      const hints=(ch.extraHints[i]||[]);
      const div=document.createElement('div');
      div.className='challenge-word'+(found?' challenge-word-found':'');
      div.innerHTML=
        '<div class="sub" style="margin-bottom:4px">Word '+(i+1)+
          ' &middot; '+ch.wordLengths[i]+' letters'+
          (found?'<span class="challenge-found">&#10003; <strong>'+word.toUpperCase()+'</strong></span>':'') +
          (revealed&&!found?'<span class="challenge-revealed">'+word+'</span>':'')+
        '</div>'+
        '<div class="challenge-clue">'+ch.clues[i]+'</div>'+
        hints.map(h=>'<div class="challenge-extra-hint">&#128161; '+h+'</div>').join('')+
        (!revealed&&!found?
          '<div class="row" style="margin-top:6px;gap:4px">'+
            '<button class="primary ask-will-btn" data-i="'+i+'">Hint (&#8722;100)</button>'+
            '<button class="danger reveal-word-btn" data-i="'+i+'">Reveal (&#8722;250)</button>'+
          '</div>':'');
      el.appendChild(div);
    });
    document.querySelectorAll('.ask-will-btn').forEach(b=>b.onclick=()=>askWill(+b.dataset.i));
    document.querySelectorAll('.reveal-word-btn').forEach(b=>b.onclick=()=>revealWord(+b.dataset.i));
    $('revealAllBtn').classList.toggle('hidden', ch.wordsRevealed.every(r=>r));
    const anyFound=ch.wordsFound.some(f=>f);
    let guide=$('challengeGuide');
    if(!guide){ guide=document.createElement('div'); guide.id='challengeGuide'; guide.className='sub'; guide.style.marginTop='8px'; $('challengeClues').after(guide); }
    guide.textContent=anyFound?'Double-tap a highlighted word to return its tiles to the tray.':'';
  }

  async function startChallenge(letters=null){
    if(!Array.isArray(letters)) letters=null;
    sfx('menu');
    const btn=$('startClassic');
    btn.textContent='Loading...'; btn.disabled=true;
    const body=letters?JSON.stringify({letters}):JSON.stringify({});
    let p=null, lastError=null;
    for(let attempt=1;attempt<=3;attempt++){
      $('menuDiag').textContent=attempt===1?'Finding challenge puzzle…':'Server waking up… retrying ('+attempt+'/3)';
      if(attempt>1) await new Promise(res=>setTimeout(res,3000));
      try{
        const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),35000);
        const r=await fetch(API+'/challenge',{method:'POST',headers:{'Content-Type':'application/json'},body,signal:ctrl.signal});
        clearTimeout(t);
        if(!r.ok){
          let msg='HTTP '+r.status;
          try{ const e=await r.json(); msg+=' '+JSON.stringify(e.detail||e); }catch(_){}
          if(r.status===422&&attempt<3){lastError=new Error(msg);continue;}
          throw new Error(msg);
        }
        p=await r.json(); break;
      }catch(e){
        if(attempt<3&&e.name!=='AbortError') continue;
        const m=e.name==='AbortError'?'timeout':e.message;
        $('menuDiag').textContent='Error: '+m+' — try again.';
        btn.textContent='Roll Virtual Dice'; btn.disabled=false; return;
      }
    }
    if(!p){ $('menuDiag').textContent='Could not reach server — try again.'; btn.textContent='Roll Virtual Dice'; btn.disabled=false; return; }
    if(p.found===false){
      $('menuDiag').textContent='No valid challenge puzzle found — try re-rolling!';
      btn.textContent='Roll Virtual Dice'; btn.disabled=false; return;
    }
    state.challenge={
      active:true,
      words:p.words, clues:p.clues, wordLengths:p.word_lengths, wordCount:p.word_count,
      score:1000, revealedAll:false,
      extraHints:p.words.map(()=>[]), wordsRevealed:p.words.map(()=>false),
      lockedWordKeys:p.words.map(()=>null), wordsFound:p.words.map(()=>false),
      foundDieIndices:new Set(),
    };
    startGame(p.letters,'challenge');
    $('menuDiag').textContent='Challenge loaded!';
    btn.textContent='Roll Virtual Dice'; btn.disabled=false;
  }

  async function startChallengeManual(){
    const raw=($('manualLetters').value||'').toUpperCase().replace(/[^A-Z]/g,'');
    if(raw.length!==12){ alert('Please enter exactly 12 letters.'); return; }
    await startChallenge(raw.split(''));
  }

  async function askWill(i){
    const ch=state.challenge;
    const btn=document.querySelector('.ask-will-btn[data-i="'+i+'"]');
    if(btn){btn.disabled=true;btn.textContent='Asking…';}
    try{
      const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),15000);
      const r=await fetch(API+'/challenge/hint',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({word:ch.words[i],clue:ch.clues[i],hint_number:(ch.extraHints[i].length+1),previous_hints:ch.extraHints[i]}),
        signal:ctrl.signal
      });
      clearTimeout(t);
      if(!r.ok) throw new Error('HTTP '+r.status);
      const j=await r.json();
      ch.extraHints[i].push(j.hint);
      ch.score=Math.max(0,ch.score-100);
      sfx('hint');
      renderChallengePanel();
    }catch(e){
      if(btn){btn.disabled=false;btn.textContent='Hint (&#8722;100)';}
    }
  }

  function revealWord(i){
    const ch=state.challenge;
    if(ch.wordsRevealed[i]) return;
    ch.wordsRevealed[i]=true;
    ch.score=Math.max(0,ch.score-250);
    sfx('remove');
    renderChallengePanel();
  }

  function revealAllWords(){
    const ch=state.challenge;
    ch.wordsRevealed=ch.wordsRevealed.map(()=>true);
    ch.revealedAll=true;
    ch.score=Math.max(0,ch.score-400);
    sfx('remove');
    renderChallengePanel();
  }

  function clearBoard(){
    sfx('clear');
    state.placed={}; state.selected=null; state.selectedCell=null; state.typingCursor=null;
    if(state.challenge.active){
      const ch=state.challenge;
      ch.lockedWordKeys=ch.words.map(()=>null);
      ch.wordsFound=ch.words.map(()=>false);
      ch.foundDieIndices=new Set();
      renderChallengePanel();
    }
    renderTray(); renderBoard();
    $('statusBar').classList.add('hidden');
  }

  function onKeyDown(e){
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    if(!state.typingCursor) return;
    const {r,c,dir}=state.typingCursor;
    if(/^[A-Za-z]$/.test(e.key)){
      e.preventDefault(); placeTypedLetter(e.key.toUpperCase());
    } else if(e.key==='Backspace'){
      e.preventDefault(); removeTypedLetter();
    } else if(e.key==='ArrowRight'){ e.preventDefault(); state.typingCursor={r,c:c+1,dir:'h'}; renderBoard(); }
    else if(e.key==='ArrowLeft') { e.preventDefault(); state.typingCursor={r,c:c-1,dir:'h'}; renderBoard(); }
    else if(e.key==='ArrowDown') { e.preventDefault(); state.typingCursor={r:r+1,c,dir:'v'}; renderBoard(); }
    else if(e.key==='ArrowUp')   { e.preventDefault(); state.typingCursor={r:r-1,c,dir:'v'}; renderBoard(); }
    else if(e.key==='Escape')    { state.typingCursor=null; renderBoard(); }
  }

  function getGrabbableTiles(){
    // Any placed tile that is NOT part of a locked/completed word is grabbable
    // by the typing cursor — single tiles, groups, anything not yet anchored.
    // Requires at least one completed word to exist (otherwise nothing is grabbed).
    const anchored=new Set();
    if(state.challenge.active){
      state.challenge.lockedWordKeys.forEach(ks=>{ if(ks) ks.forEach(k=>anchored.add(k)); });
    } else {
      collectRuns(state.placed).filter(r=>r.word.length>=3).forEach(r=>r.keys.forEach(k=>anchored.add(k)));
    }
    if(!anchored.size) return new Set();
    const grabbable=new Set();
    Object.keys(state.placed).forEach(k=>{ if(!anchored.has(k)) grabbable.add(k); });
    return grabbable;
  }

  function placeTypedLetter(letter){
    const {r,c,dir}=state.typingCursor;
    const key=r+','+c;
    // Cell already has this exact letter → just advance past it (crossing)
    if(state.placed[key]){
      if(state.placed[key].letter===letter){
        let nr=r+(dir==='v'?1:0),nc=c+(dir==='h'?1:0);
        while(state.placed[nr+','+nc]){ nr+=(dir==='v'?1:0); nc+=(dir==='h'?1:0); }
        state.lastTypingDir=dir; state.typingCursor={r:nr,c:nc,dir}; renderBoard();
      } else { sfx('error'); }
      return;
    }
    // Find the die: tray first, then floating board tiles
    const usedDice=new Set(Object.values(state.placed).map(p=>p.dieIdx));
    let dieIdx=state.trayOrder.find(i=>!usedDice.has(i)&&state.letters[i]===letter);
    let fromKey=null;
    if(dieIdx===undefined){
      const grabbable=getGrabbableTiles();
      fromKey=[...grabbable].find(k=>state.placed[k]&&state.placed[k].letter===letter);
      if(fromKey!==undefined) dieIdx=state.placed[fromKey].dieIdx;
      else { sfx('error'); return; }
    }
    sfx('place');
    if(fromKey) delete state.placed[fromKey];
    state.placed[key]={letter,dieIdx};
    state.selected=null;
    state.lastTypingDir=dir;
    // Advance cursor, skipping any already-placed tiles (crossings)
    let nr=r+(dir==='v'?1:0), nc=c+(dir==='h'?1:0);
    while(state.placed[nr+','+nc]){ nr+=(dir==='v'?1:0); nc+=(dir==='h'?1:0); }
    state.typingCursor={r:nr,c:nc,dir};
    if(state.challenge.active){
      const newLock=checkChallengeWordLocks();
      if(newLock){
        renderChallengePanel();
        if(state.challenge.wordsFound.every(f=>f)&&!collectRuns(state.placed).some(run=>run.word.length===2))
          launchFireworks();
      }
    }
    $('placedCount').textContent=Object.keys(state.placed).length;
    $('placedScore').textContent=Object.keys(state.placed).length;
    renderTray(); renderBoard();
  }

  function removeTypedLetter(){
    const {r,c,dir}=state.typingCursor;
    const key=r+','+c;
    if(state.placed[key]){
      sfx('remove'); delete state.placed[key];
      $('placedCount').textContent=Object.keys(state.placed).length;
      $('placedScore').textContent=Object.keys(state.placed).length;
      renderTray(); renderBoard();
    } else {
      const pr=r-(dir==='v'?1:0), pc=c-(dir==='h'?1:0);
      state.typingCursor={r:pr,c:pc,dir};
      const prevKey=pr+','+pc;
      if(state.placed[prevKey]){
        sfx('remove'); delete state.placed[prevKey];
        $('placedCount').textContent=Object.keys(state.placed).length;
        $('placedScore').textContent=Object.keys(state.placed).length;
        renderTray();
      }
      renderBoard();
    }
  }

  window.addEventListener('DOMContentLoaded',()=>{
    $('nesBtn').onclick=()=>setTheme('nes');
    $('snesBtn').onclick=()=>setTheme('snes');
    $('musicBtn').onclick=toggleMusic;
    $('soundBtn').onclick=toggleSound;
    document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
    $('revealAllBtn').onclick=revealAllWords;
    $('menuBtn').onclick=showMenu;
    $('clearBtn').onclick=clearBoard;
    $('validateBtn').onclick=validate;
    $('newRollBtn').onclick=newRoll;
    $('shuffleBtn').onclick=shuffleTray;
    $('enterMyRollBtn').onclick=()=>{
      $('manualInput').classList.remove('hidden');
      $('enterMyRollIllo').classList.remove('hidden');
      $('manualLetters').value='';
      $('scanStatus').textContent='Enter exactly 12 letters matching your physical dice roll.';
      const btn=$('startClassic');
      btn._isPhysical=true; btn.disabled=true;
      if(state.mode==='challenge'){
        btn.textContent='Start Challenge'; btn.onclick=startChallengeManual;
      } else {
        state.mode='manual';
        btn.textContent='Play With My Dice'; btn.onclick=startClassic;
      }
    };
    $('manualLetters').addEventListener('input', validateManualLetters);
    document.addEventListener('keydown', onKeyDown);
    window.addEventListener('beforeunload', e=>{
      const gameActive=!$('gameScreen').classList.contains('hidden');
      const hasProgress=Object.keys(state.placed).length>0;
      if(gameActive&&hasProgress){ e.preventDefault(); return e.returnValue=''; }
    });
    document.body.className='snes';
    state.theme='snes';
    $('nesBtn').classList.remove('active');
    $('snesBtn').classList.add('active');
    musicOn=false; soundOn=true;
    $('musicBtn').textContent='♪ OFF';
    $('soundBtn').textContent='SFX ON';
  });
})();
</script>
<canvas id="fireworksCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;opacity:0;transition:opacity .6s;"></canvas>
